<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Research Copilot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <div class="container">
      <h1>Research Copilot</h1>
      <p class="muted">Start and manage your current research session.</p>

      <label for="goal">Research goal</label>
      <textarea id="goal" rows="4" placeholder="Example: Understand poverty in Japan"></textarea>

      <div class="row gap-sm">
        <button id="startBtn">Start session</button>
        <button id="openPanelBtn" class="secondary">Open panel</button>
      </div>

      <div class="section">
        <div class="label-row">
          <span>Status</span>
          <span id="healthBadge" class="badge">Checking backend…</span>
        </div>
        <div id="statusText" class="muted"></div>
      </div>

      <div class="section">
        <label for="backendUrl">Backend URL</label>
        <input id="backendUrl" type="text" placeholder="http://localhost:8000" />
        <label class="checkbox-row">
          <input id="autoAnalyze" type="checkbox" />
          Auto-analyze pages during research sessions
        </label>
        <button id="saveSettingsBtn" class="secondary">Save settings</button>
      </div>

      <div id="sessionInfo" class="section"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
