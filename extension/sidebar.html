<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Research Copilot Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="sidebar-body">
    <div class="sidebar-shell">
      <div class="topbar">
        <div>
          <h1>Research Copilot</h1>
          <div id="updatedAt" class="muted small"></div>
        </div>
      </div>

      <section class="section">
        <div class="section-header-inline">
          <h2>Current Session</h2>
        </div>
        <div id="currentSessionSummary"></div>
      </section>

      <section class="section">
        <div class="section-header-inline">
          <h2>Past Sessions</h2>
          <div id="pastSessionsMeta" class="muted small"></div>
        </div>
        <div id="pastSessionsList" class="session-list"></div>
      </section>

      <section class="section">
        <h2>Goal</h2>
        <div id="goalText" class="card muted">No active session.</div>
      </section>

      <section class="section">
        <h2>Research Questions</h2>
        <ul id="questionsList" class="list"></ul>
      </section>

      <section class="section">
        <h2>Insights</h2>
        <div class="insights-toolbar">
          <div class="segmented-control" role="tablist" aria-label="Insights view">
            <button
              type="button"
              id="groupedInsightsBtn"
              class="segmented-control-btn"
              data-view="grouped"
              role="tab"
              aria-selected="true"
            >
              Group by Topic
            </button>
            <button
              type="button"
              id="timelineInsightsBtn"
              class="segmented-control-btn"
              data-view="timeline"
              role="tab"
              aria-selected="false"
            >
              Timeline
            </button>
          </div>
          <div id="insightsMeta" class="muted small"></div>
        </div>
        <div id="insightsNotice" class="insights-notice hidden" aria-live="polite"></div>
        <div id="insightsList"></div>
      </section>

      <section class="section">
        <h2>Missing Topics</h2>
        <ul id="missingTopicsList" class="list"></ul>
      </section>

      <section class="section">
        <h2>Sources</h2>
        <ul id="sourcesList" class="list"></ul>
      </section>
    </div>
    <script src="insightGrouping.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
